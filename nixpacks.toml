# Railway / Nixpacks — Python app + Playwright Chromium for AI Assistant

[phases.setup]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2t64",
  "libpango-1.0-0",
  "libcairo2",
  "fonts-liberation",
  "xdg-utils",
]

[phases.build]
cmds = [
  "python -m playwright install --with-deps chromium",
]

[variables]
HEADLESS = "1"
PLAYWRIGHT_BROWSERS_PATH = "/root/.cache/ms-playwright"
